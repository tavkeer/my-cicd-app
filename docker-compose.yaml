version: '3.8'

services:
  app:

    # ── IMAGE ──────────────────────────────────────────────────────────────
    # Instead of "build: ." we use a pre-built image from ECR.
    # These variables are injected by Jenkins during the Deploy stage via SSH.
    # ${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG} resolves to something like:
    # 123456789012.dkr.ecr.ap-south-1.amazonaws.com/my-cicd-app:42
    image: ${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}

    container_name: my-cicd-app

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=production
      - PORT=3000

    restart: unless-stopped
